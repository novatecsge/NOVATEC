services:
  - type: web
    name: sge-cecyt9
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_QR_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: JWT_QR_EXPIRES_IN
        value: 30d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: DB_HOST
        fromDatabase:
          name: sge-cecyt9-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sge-cecyt9-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sge-cecyt9-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sge-cecyt9-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sge-cecyt9-db
          property: password

databases:
  - name: sge-cecyt9-db
    plan: free
